spring:
  main:
    allow-bean-definition-overriding: true
  # The 'test' profile replaces the runtime-selected exporter profile, and
  # @AutoConfigureObservability forces tracing reporters to be created. Both
  # exporter libraries are on the classpath, so pin tests to a single exporter
  # (OTLP) to keep behaviour deterministic and avoid double export.
  autoconfigure:
    exclude:
      - org.springframework.boot.micrometer.tracing.opentelemetry.autoconfigure.zipkin.ZipkinWithOpenTelemetryTracingAutoConfiguration
  cloud:
    gateway:
      server:
        webflux:
          trusted-proxies: ".*"
          httpclient:
            connect-timeout: 2000
            response-timeout: 5s # ingress 60s

jumper:
  issuer:
    url: https://stargate-test.de/auth/realms
  security:
    dir: src/test/resources/keypair
  zone:
    health:
      enabled: :true
      redis:
        channel: stargate-zone-status
        checkConnectionInterval: 15000
  horizon:
    publishEventUrl: http://localhost:1082/v1/events

test:
  upstream:
    ssl:
      handshake-timeout: 1
